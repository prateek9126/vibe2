# MySQL Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/productivity_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
